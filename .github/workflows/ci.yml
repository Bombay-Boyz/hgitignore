name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test (GHC ${{ matrix.ghc }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ghc: ["9.6.3"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Stack
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          enable-stack: true
          stack-version: latest

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: ~/.stack
          key: stack-${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('stack.yaml', '**/package.yaml') }}
          restore-keys: |
            stack-${{ runner.os }}-${{ matrix.ghc }}-

      - name: Verify GHC flags are present (regression guard)
        run: |
          for pkg in hgitignore-core hgitignore hgitignore-testkit; do
            for flag in "-Wall" "-Wcompat" "-Wincomplete-patterns" "-Werror"; do
              if ! grep -q -- "$flag" "$pkg/package.yaml"; then
                echo "ERROR: $flag missing from $pkg/package.yaml"
                exit 1
              fi
            done
          done
          echo "GHC flags verified in all packages."

      - name: Build (all packages)
        run: stack build --no-terminal --test --no-run-tests

      - name: Test (all packages)
        run: stack test --no-terminal

      - name: hlint
        run: |
          stack install hlint --no-terminal
          hlint $(find . -name "*.hs" -not -path "*/.stack-work/*" -not -path "*/dist-newstyle/*")

      - name: fourmolu format check
        run: |
          stack install fourmolu --no-terminal
          fourmolu --mode check $(find . -name "*.hs" -not -path "*/.stack-work/*" -not -path "*/dist-newstyle/*")
