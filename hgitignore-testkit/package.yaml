name:        hgitignore-testkit
version:     0.1.0.0
synopsis:    Test generators, fixtures, and parity helpers for hgitignore
description: >
  Shared test infrastructure: Hedgehog generators, Git parity helpers,
  and corpus fixture loaders. Never depended on by production code.

author:      ""
maintainer:  ""
license:     AllRightsReserved

ghc-options:
  - -Wall
  - -Wcompat
  - -Wincomplete-patterns
  - -Werror

dependencies:
  - base >= 4.14 && < 5
  - text
  - hedgehog
  - yaml
  - aeson
  - process
  - filepath
  - directory
  - vector
  - hgitignore-core

library:
  source-dirs: src
  exposed-modules:
    - HGitIgnore.Testkit.Generators
    - HGitIgnore.Testkit.Fixtures
    - HGitIgnore.Testkit.Parity

tests:
  hgitignore-testkit-test:
    main:        Spec.hs
    source-dirs: test
    ghc-options:
      - -Wall
      - -Wcompat
      - -Wincomplete-patterns
      - -Werror
    dependencies:
      - hgitignore-testkit
      - hedgehog
